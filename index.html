<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>抒情簿</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="icon" type="image/png" href="assets/icons/icon-192.png">
<link rel="stylesheet" href="src/css/style.css">
</head>
<body>

<header>
  <h1>📖 抒情簿</h1>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索内容...">
  </div>
  <div class="jump-to">
    <span class="jump-prefix">#</span>
    <input type="text" id="jumpInput" placeholder="跳转">
  </div>
  <div class="top-actions">
    <button id="favFilterBtn" title="只看收集">⭐</button>
    <button id="excerptFilterBtn" title="只看摘录">📝</button>
    <button id="viewToggleBtn" title="切换视图">📋</button>
    <button id="keepPositionBtn" title="刷新后保持阅读位置（已关闭）">📍</button>
    <button id="themeBtn" title="切换白天/深色模式">🌙</button>
  </div>
  <span class="stats" id="statsLabel"></span>
  <span class="io-btns">
    <button id="exportBtn" title="导出收集">📤</button>
    <button id="importBtn" title="导入收集">📥</button>
  </span>
</header>

<div class="category-bar" id="categoryBar"></div>

<div class="main-area">
  <div class="card" id="cardView">
    <div class="empty-state" id="emptyState">
      <div class="big">📖</div>
      <div>点击下方按钮开始阅读</div>
    </div>
    <div class="content" id="entryContent"></div>
    <div class="meta" id="entryMeta"></div>
  </div>

  <div id="listView"></div>
</div>

<div class="bottom-bar">
  <button class="action-btn" id="prevBtn"><span class="icon">◀</span> 上一条</button>
  <button class="action-btn primary" id="randomBtn"><span class="icon">🎲</span> 随机</button>
  <button class="action-btn" id="nextBtn"><span class="icon">▶</span> 下一条</button>
  <button class="action-btn" id="favBtn"><span class="icon">☆</span> 收集</button>
</div>

<div id="toast"></div>

<script src="src/js/app.js"></script>
</body>
</html>
