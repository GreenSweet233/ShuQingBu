<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>抒情簿</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="icon" type="image/png" href="assets/icons/icon-192.png">
<script>
(function() {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'light') {
    document.documentElement.classList.add('light');
    document.querySelector('meta[name="theme-color"]').content = '#f5f0eb';
  }
})();
</script>
<link rel="stylesheet" href="src/css/style.css?v=4">
</head>
<body>

<header>
  <h1>📖 抒情簿</h1>
  <div class="search-bar">
    <svg class="icon-search"><use href="#search"></use></svg>
    <input type="text" id="searchInput" placeholder="搜索内容... / #跳转">
  </div>
  <div class="top-actions">
     <button id="categoryBtn" title="选择分类"><svg class="icon-book"><use href="#book"></use></svg></button>
    <button id="favFilterBtn" title="只看收集"><svg class="icon-star"><use href="#star-filled"></use></svg></button>
    <button id="excerptFilterBtn" title="只看摘录"><svg class="icon-excerpt"><use href="#excerpt"></use></svg></button>
    <button id="viewToggleBtn" title="切换视图"><svg class="icon-view"><use href="#view-list"></use></svg></button>
    <button id="menuBtn" title="更多选项">☰</button>
  </div>
  <span class="stats" id="statsLabel"></span>
</header>

<div class="category-bar" id="categoryBar"></div>

<div class="main-area">
  <div class="card" id="cardView">
    <div class="empty-state" id="emptyState">
      <div class="big">📖</div>
      <div>点击下方按钮开始阅读</div>
    </div>
    <div class="content" id="entryContent"></div>
    <div class="meta" id="entryMeta"></div>
  </div>

  <div id="listView"></div>
</div>

<div class="bottom-bar">
  <button class="action-btn" id="prevBtn"><span class="icon">◀</span> 上一条</button>
  <button class="action-btn primary" id="randomBtn">随机</button>
  <button class="action-btn" id="nextBtn"><span class="icon">▶</span> 下一条</button>
  <button class="action-btn" id="favBtn"><span class="icon"><svg class="icon-star"><use href="#star-outline"></use></svg></span> 收集</button>
</div>

<div id="toast"></div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2><svg class="icon-gear"><use href="#gear"></use></svg> 设置</h2>
    <button id="closeSidebarBtn" class="close-btn">✕</button>
  </div>
  <div class="sidebar-content">
    <div class="section">
      <div class="section-title">阅读设置</div>
      <div class="menu-item" id="keepPositionItem">
        <span class="menu-icon"><svg class="icon-balloon"><use href="#balloon"></use></svg></span>
        <span class="menu-text">保持阅读位置</span>
        <span class="menu-status" id="keepPositionStatus">关闭</span>
        <div class="toggle-switch" id="keepPositionToggle"></div>
      </div>
      <div class="menu-item" id="themeItem">
        <span class="menu-icon"><svg class="icon-moon"><use href="#moon"></use></svg></span>
        <span class="menu-text">深色模式</span>
        <span class="menu-status" id="themeStatus">开启</span>
        <div class="toggle-switch" id="themeToggle"></div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">数据管理</div>
      <div class="menu-item clickable" id="exportItem">
        <span class="menu-icon"><svg class="icon-export"><use href="#export"></use></svg></span>
        <span class="menu-text">导出收集</span>
        <span class="menu-arrow"></span>
      </div>
      <div class="menu-item clickable" id="importItem">
        <span class="menu-icon"><svg class="icon-import"><use href="#import"></use></svg></span>
        <span class="menu-text">导入收集</span>
        <span class="menu-arrow"></span>
      </div>
    </div>
    <div class="section">
      <div class="section-title">快捷操作</div>
      <div class="menu-item clickable" id="clearPositionItem">
        <span class="menu-icon"><svg class="icon-trash"><use href="#trash"></use></svg></span>
        <span class="menu-text">清除阅读位置</span>
        <span class="menu-arrow">→</span>
      </div>
    </div>
  </div>
</div>

<script src="src/js/app.js?v=4"></script>
