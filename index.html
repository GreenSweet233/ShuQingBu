<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>抒情簿</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #e8e8e8;
  --text2: #a0a0b0;
  --accent: #e94560;
  --accent2: #533483;
  --gold: #f0c040;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,.3);
}
.light {
  --bg: #f5f0eb;
  --surface: #fff8f0;
  --surface2: #e8ddd0;
  --text: #2c2c2c;
  --text2: #888;
  --accent: #c0392b;
  --accent2: #8e6b8a;
  --gold: #b8860b;
  --shadow: 0 4px 24px rgba(0,0,0,.08);
}
* { margin:0; padding:0; box-sizing:border-box; transition: background-color .5s ease, color .5s ease, border-color .5s ease, box-shadow .5s ease; }
html { transition: background-color .5s ease; }
body {
  font-family: "SimSun", "宋体", "Noto Serif SC", "STSong", serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  padding: 16px 20px 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}
header .stats {
  font-size: 12px;
  color: var(--text2);
}
.io-btns {
  display: flex;
  gap: 2px;
}
.io-btns button {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  transition: all .2s;
}
.io-btns button:hover {
  color: var(--accent);
  background: rgba(233,69,96,.1);
}
.search-bar {
  flex: 1;
  min-width: 140px;
  max-width: 320px;
  position: relative;
}
.search-bar input {
  width: 100%;
  padding: 8px 12px 8px 32px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.1);
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border .2s;
}
.search-bar input:focus { border-color: var(--accent); }
.jump-to {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--surface2);
  border-radius: 16px;
  padding: 0 8px;
  border: 1px solid rgba(255,255,255,.1);
}
.jump-to:focus-within { border-color: var(--accent); }
.jump-prefix {
  font-size: 13px;
  color: var(--text2);
  font-weight: 700;
}
.jump-to input {
  width: 48px;
  padding: 6px 2px;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.search-bar::before {
  content: "🔍";
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  opacity: .5;
}
.top-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}
.top-actions button {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  transition: all .2s;
}
.top-actions button:hover, .top-actions button.active {
  color: var(--gold);
  background: rgba(240,192,64,.1);
}
.category-bar {
  padding: 4px 16px 8px;
  overflow-x: auto;
  white-space: nowrap;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  display: flex;
  gap: 6px;
  align-items: center;
}
.category-bar::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0;
  padding: 4px 14px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,.12);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.cat-btn:hover { border-color: var(--accent); color: var(--text); }
.cat-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.cat-count {
  font-size: 10px;
  opacity: .6;
  margin-left: 2px;
}
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 8px 16px 16px;
}
.card {
  flex: 1;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow-y: auto;
  min-height: 200px;
  max-height: 70vh;
}
.card .content {
  font-size: 16px;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  flex: 1;
}
.card .entry-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  opacity: .6;
  margin-bottom: 8px;
}
.card .meta {
  margin-top: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  font-size: 12px;
  color: var(--text2);
  border-top: 1px solid rgba(255,255,255,.06);
  padding-top: 14px;
}
.card .meta .date { margin-right: auto; }
.card .meta .tag {
  padding: 2px 10px;
  border-radius: 10px;
  background: rgba(233,69,96,.15);
  color: var(--accent);
  font-size: 11px;
}
.card .meta .tag.excerpt { background: rgba(83,52,131,.3); color: #b388ff; }
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  font-size: 14px;
  text-align: center;
  flex-direction: column;
  gap: 12px;
}
.empty-state .big { font-size: 48px; }
.bottom-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 12px 16px 24px;
  flex-wrap: wrap;
}
.action-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: 24px;
  border: none;
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.action-btn:hover { background: var(--accent2); }
.action-btn.primary { background: var(--accent); }
.action-btn.primary:hover { background: #d63850; }
.action-btn.faved { background: var(--gold); color: #1a1a1a; }
.action-btn .icon { font-size: 16px; }
#listView {
  display: none;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  flex: 1;
}
#listView .list-item {
  background: var(--surface);
  border-radius: 8px;
  padding: 14px 16px;
  cursor: pointer;
  transition: background .15s;
  font-size: 14px;
  line-height: 1.6;
}
#listView .list-item:hover { background: var(--surface2); }
#listView .list-item[style*="accent"] { background: rgba(233,69,96,.08); }
#listView .list-item .item-date { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
#listView .list-item .item-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
#listView .list-item .item-cats span { font-size: 10px; padding: 1px 8px; border-radius: 8px; background: rgba(233,69,96,.12); color: var(--accent); }
#listView .list-item .item-fav { float: right; cursor: pointer; font-size: 16px; }
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  color: var(--text);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  z-index: 100;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@media (max-width: 480px) {
  header { padding: 12px 14px 4px; }
  header h1 { font-size: 17px; }
  .search-bar { max-width: 100%; }
  .card { padding: 20px 16px; min-height: 160px; max-height: 65vh; }
  .card .content { font-size: 15px; }
  .action-btn { padding: 8px 14px; font-size: 13px; }
  .bottom-bar { gap: 6px; padding: 10px 12px 20px; }
}
@media (min-width: 768px) {
  .main-area { max-width: 720px; margin: 0 auto; width: 100%; }
  .bottom-bar { max-width: 720px; margin: 0 auto; width: 100%; }
  .category-bar { max-width: 720px; margin: 0 auto; width: 100%; }
}
</style>
</head>
<body>

<header>
  <h1>📖 抒情簿</h1>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索内容...">
  </div>
  <div class="jump-to">
    <span class="jump-prefix">#</span>
    <input type="text" id="jumpInput" placeholder="跳转">
  </div>
  <div class="top-actions">
    <button id="favFilterBtn" title="只看收藏">⭐</button>
    <button id="excerptFilterBtn" title="只看摘录">📝</button>
    <button id="viewToggleBtn" title="切换视图">📋</button>
    <button id="themeBtn" title="切换白天/深色模式">🌙</button>
  </div>
  <span class="stats" id="statsLabel"></span>
  <span class="io-btns">
    <button id="exportBtn" title="导出收藏">📤</button>
    <button id="importBtn" title="导入收藏">📥</button>
  </span>
</header>

<div class="category-bar" id="categoryBar"></div>

<div class="main-area">
  <div class="card" id="cardView">
    <div class="empty-state" id="emptyState">
      <div class="big">📖</div>
      <div>点击下方按钮开始阅读</div>
    </div>
    <div class="content" id="entryContent"></div>
    <div class="meta" id="entryMeta"></div>
  </div>

  <div id="listView"></div>
</div>

<div class="bottom-bar">
  <button class="action-btn" id="prevBtn"><span class="icon">◀</span> 上一条</button>
  <button class="action-btn primary" id="randomBtn"><span class="icon">🎲</span> 随机</button>
  <button class="action-btn" id="nextBtn"><span class="icon">▶</span> 下一条</button>
  <button class="action-btn" id="favBtn"><span class="icon">☆</span> 收藏</button>
</div>

<div id="toast"></div>

<script>
const DB_NAME = 'shuqingbu';
const DB_VER = 1;
let entries = [];
let currentIndex = -1;
let currentFiltered = [];
let currentCategory = '';
let favFilter = false;
let excerptFilter = false;
let isListView = false;
let favorites = new Set();

// --- Init IndexedDB ---
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('favorites')) {
        db.createObjectStore('favorites', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}

async function loadFavorites(db) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('favorites', 'readonly');
    const store = tx.objectStore('favorites');
    const req = store.getAll();
    req.onsuccess = () => {
      favorites = new Set(req.result.map(r => r.id));
      resolve();
    };
    req.onerror = () => reject(req.error);
  });
}

async function toggleFavorite(db, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('favorites', 'readwrite');
    const store = tx.objectStore('favorites');
    if (favorites.has(id)) {
      store.delete(id);
      favorites.delete(id);
    } else {
      store.put({ id });
      favorites.add(id);
    }
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// --- Theme ---
function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '☀️';
    document.querySelector('meta[name="theme-color"]').content = '#f5f0eb';
  }
}
function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').content = isLight ? '#f5f0eb' : '#1a1a2e';
}

// --- Load Data ---
async function init() {
  const db = await openDB();
  await loadFavorites(db);

  const resp = await fetch('entries.json');
  entries = await resp.json();

  renderCategories();
  applyFilters();
  randomEntry();
  bindEvents(db);
  initTheme();
}

// --- Category rendering ---
function getAllCategoryNames() {
  const set = new Set();
  entries.forEach(e => e.categories.forEach(c => set.add(c)));
  const sorted = Array.from(set).sort((a,b) => {
    const countA = entries.filter(e => e.categories.includes(a)).length;
    const countB = entries.filter(e => e.categories.includes(b)).length;
    return countB - countA;
  });
  return sorted;
}

function renderCategories() {
  const cats = getAllCategoryNames();
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = `<button class="cat-btn${currentCategory === '' ? ' active' : ''}" data-cat="">全部</button>`;
  cats.forEach(c => {
    const count = entries.filter(e => e.categories.includes(c)).length;
    const btn = document.createElement('button');
    btn.className = `cat-btn${currentCategory === c ? ' active' : ''}`;
    btn.dataset.cat = c;
    btn.innerHTML = `${c} <span class="cat-count">${count}</span>`;
    bar.appendChild(btn);
  });
}

// --- Filtering ---
function applyFilters() {
  let filtered = entries;

  if (currentCategory) {
    filtered = filtered.filter(e => e.categories.includes(currentCategory));
  }
  if (favFilter) {
    filtered = filtered.filter(e => favorites.has(e.id));
  }
  if (excerptFilter) {
    filtered = filtered.filter(e => e.is_excerpt);
  }
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) {
    filtered = filtered.filter(e => e.content.toLowerCase().includes(q));
  }

  currentFiltered = filtered;

  const stats = document.getElementById('statsLabel');
  stats.textContent = `${currentFiltered.length} / ${entries.length}`;

  if (currentFiltered.length === 0) {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('entryContent').textContent = '';
    document.getElementById('entryMeta').innerHTML = '';
  } else {
    document.getElementById('emptyState').style.display = 'none';
  }

  if (isListView) renderList();
}

function navigateTo(index) {
  if (currentFiltered.length === 0) return;
  if (index < 0) index = currentFiltered.length - 1;
  if (index >= currentFiltered.length) index = 0;
  currentIndex = index;
  renderEntry(currentFiltered[currentIndex]);
}

function renderEntry(entry) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('entryContent').innerHTML = `<div class="entry-num">#${entry.id}（${currentIndex + 1}/${currentFiltered.length}）</div>${escHtml(entry.content)}`;

  const meta = document.getElementById('entryMeta');
  let html = '';
  if (entry.date) html += `<span class="date">${entry.date}</span>`;
  if (entry.is_excerpt) {
    html += `<span class="tag excerpt">摘录</span>`;
  }
  entry.categories.forEach(c => {
    html += `<span class="tag">${c}</span>`;
  });
  meta.innerHTML = html;

  const favBtn = document.getElementById('favBtn');
  if (favorites.has(entry.id)) {
    favBtn.innerHTML = '<span class="icon">⭐</span> 已收藏';
    favBtn.className = 'action-btn faved';
  } else {
    favBtn.innerHTML = '<span class="icon">☆</span> 收藏';
    favBtn.className = 'action-btn';
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function randomEntry() {
  if (currentFiltered.length === 0) {
    showToast('没有匹配的条目');
    return;
  }
  const idx = Math.floor(Math.random() * currentFiltered.length);
  currentIndex = idx;
  renderEntry(currentFiltered[idx]);
  if (isListView) renderList();
}

// --- List View ---
function renderList() {
  const container = document.getElementById('listView');
  container.style.display = 'flex';
  document.getElementById('cardView').style.display = 'none';

  container.innerHTML = currentFiltered.map((e, i) => {
    const cats = e.categories.map(c => `<span>${c}</span>`).join('');
    const fav = favorites.has(e.id) ? '⭐' : '☆';
    const excerpt = e.is_excerpt ? ' 📝' : '';
    const text = e.content.length > 100 ? e.content.slice(0, 100) + '…' : e.content;
    const active = i === currentIndex ? ' style="border-left:3px solid var(--accent);"' : '';
    return `<div class="list-item" data-idx="${i}"${active}>
      <div class="item-date">#${e.id} &middot; ${e.date || '无日期'}${excerpt}</div>
      <div>${escHtml(text)}</div>
      <div class="item-cats">${cats}</div>
      <span class="item-fav" data-idx2="${i}">${fav}</span>
    </div>`;
  }).join('');
  // Scroll current item into view
  const activeItem = container.querySelector('.list-item[style*="accent"]');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function showCardView() {
  document.getElementById('listView').style.display = 'none';
  document.getElementById('cardView').style.display = 'flex';
  if (currentFiltered.length > 0 && currentIndex >= 0) {
    renderEntry(currentFiltered[currentIndex]);
  }
}

// --- Import / Export Favorites ---
async function exportFavorites() {
  const ids = Array.from(favorites);
  if (ids.length === 0) { showToast('没有收藏的条目'); return; }
  const text = ids.join(',');
  await navigator.clipboard.writeText(text);
  showToast(`已复制 ${ids.length} 个收藏ID`);
}

async function importFavorites(db) {
  const input = prompt('粘贴收藏ID，用逗号分隔，例如： 1,5,23,42');
  if (!input) return;
  const ids = input.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
  if (ids.length === 0) { showToast('未识别到有效ID'); return; }
  const tx = db.transaction('favorites', 'readwrite');
  const store = tx.objectStore('favorites');
  ids.forEach(id => store.put({ id }));
  await new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
  ids.forEach(id => favorites.add(id));
  showToast(`导入了 ${ids.length} 个收藏`);
  applyFilters();
  if (currentFiltered.length > 0) randomEntry();
}

// --- Toast ---
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2000);
}

// --- Events ---
function bindEvents(db) {
  // Category clicks
  document.getElementById('categoryBar').addEventListener('click', (e) => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat === '全部' ? '' : btn.dataset.cat;
    applyFilters();
    if (currentFiltered.length > 0) randomEntry();
  });

  // Jump to ID
  document.getElementById('jumpInput').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const val = document.getElementById('jumpInput').value.trim();
    const targetId = parseInt(val, 10);
    if (isNaN(targetId)) { showToast('请输入有效编号'); return; }
    const idx = currentFiltered.findIndex(e => e.id === targetId);
    if (idx === -1) {
      // Try global
      const globalIdx = entries.findIndex(e => e.id === targetId);
      if (globalIdx === -1) { showToast(`未找到 #${targetId}`); return; }
      // Reset category filter and jump
      currentCategory = '';
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.cat-btn[data-cat=""]')?.classList.add('active');
      applyFilters();
    }
    const newIdx = currentFiltered.findIndex(e => e.id === targetId);
    if (newIdx >= 0) {
      currentIndex = newIdx;
      if (isListView) { isListView = false; showCardView(); document.getElementById('viewToggleBtn').textContent = '📋'; }
      renderEntry(currentFiltered[currentIndex]);
      document.getElementById('jumpInput').value = '';
    }
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', () => {
    applyFilters();
    if (currentFiltered.length > 0 && currentIndex >= currentFiltered.length) {
      currentIndex = 0;
    }
    if (isListView) renderList();
    else if (currentFiltered.length > 0 && currentIndex >= 0) {
      const currentId = currentFiltered[currentIndex]?.id;
      const stillIn = currentFiltered.findIndex(e => e.id === currentId);
      if (stillIn >= 0) currentIndex = stillIn;
      else currentIndex = 0;
      renderEntry(currentFiltered[currentIndex]);
    }
  });

  // Random
  document.getElementById('randomBtn').addEventListener('click', randomEntry);

  // Prev / Next
  document.getElementById('prevBtn').addEventListener('click', () => navigateTo(currentIndex - 1));
  document.getElementById('nextBtn').addEventListener('click', () => navigateTo(currentIndex + 1));

  // Favorite
  document.getElementById('favBtn').addEventListener('click', async () => {
    if (currentFiltered.length === 0 || currentIndex < 0) return;
    const entry = currentFiltered[currentIndex];
    await toggleFavorite(db, entry.id);
    renderEntry(entry);
    if (isListView) renderList();
    showToast(favorites.has(entry.id) ? '已收藏 ⭐' : '已取消收藏');
  });

  // Fav filter
  document.getElementById('favFilterBtn').addEventListener('click', () => {
    favFilter = !favFilter;
    document.getElementById('favFilterBtn').classList.toggle('active');
    applyFilters();
    if (currentFiltered.length > 0) randomEntry();
  });

  // Excerpt filter
  document.getElementById('excerptFilterBtn').addEventListener('click', () => {
    excerptFilter = !excerptFilter;
    document.getElementById('excerptFilterBtn').classList.toggle('active');
    applyFilters();
    if (currentFiltered.length > 0) randomEntry();
  });

  // Mouse wheel horizontal scroll for category bar
  document.getElementById('categoryBar').addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      e.currentTarget.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, { passive: false });

  // Export / Import
  document.getElementById('exportBtn').addEventListener('click', exportFavorites);
  document.getElementById('importBtn').addEventListener('click', () => importFavorites(db));

  // Theme toggle
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);

  // View toggle
  document.getElementById('viewToggleBtn').addEventListener('click', () => {
    isListView = !isListView;
    if (isListView) {
      document.getElementById('viewToggleBtn').textContent = '📖';
      renderList();
    } else {
      document.getElementById('viewToggleBtn').textContent = '📋';
      showCardView();
    }
  });

  // List item click (show in card)
  document.getElementById('listView').addEventListener('click', (e) => {
    const item = e.target.closest('.list-item');
    const fav = e.target.closest('.item-fav');
    if (fav) {
      const idx = parseInt(fav.dataset.idx2);
      const entry = currentFiltered[idx];
      if (entry) {
        toggleFavorite(db, entry.id).then(() => {
          renderList();
          showToast(favorites.has(entry.id) ? '已收藏 ⭐' : '已取消收藏');
        });
      }
      return;
    }
    if (item) {
      currentIndex = parseInt(item.dataset.idx);
      isListView = false;
      showCardView();
      renderEntry(currentFiltered[currentIndex]);
      document.getElementById('viewToggleBtn').textContent = '📋';
    }
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft') navigateTo(currentIndex - 1);
    if (e.key === 'ArrowRight') navigateTo(currentIndex + 1);
    if (e.key === ' ') { e.preventDefault(); randomEntry(); }
    if (e.key === 'f' || e.key === 'F') document.getElementById('favBtn').click();
  });
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js', { scope: '.' });
}
</script>
</body>
</html>
